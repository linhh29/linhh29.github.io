name: Update Google Scholar Citations

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 时间 0 点（北京时间早上 8 点）自动运行一次
  workflow_dispatch: # 允许手动点击运行

jobs:
  update-citations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch from SerpApi and extract citations
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          # 1. 调用接口并将原始数据存入 temp.json
          curl -s "https://serpapi.com/search.json?engine=google_scholar_author&author_id=u2TFzcAAAAAJ&api_key=${SERPAPI_KEY}" > temp.json

          # 2. 使用 jq 精准提取引用数字（例如：87）
          CITATIONS=$(jq -r '.cited_by.table[0].citations.all' temp.json)
          echo "成功抓取到引用量: $CITATIONS"

          # 3. 直接替换打包产物里的 citations 数字
          JS_FILE=$(ls assets/index-*.js)
          if [ -z "$JS_FILE" ]; then
            echo "未找到 assets/index-*.js，退出"
            exit 1
          fi

          # 将形如 citations:61 或 citations : 61 替换为最新值
          sed -E -i "s/(citations[[:space:]]*:[[:space:]]*)[0-9]+/\1$CITATIONS/g" "$JS_FILE"
          echo "已更新文件: $JS_FILE"
          rm -f temp.json

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add assets/index-*.js || true
          git diff --staged --quiet || git commit -m "Auto-update citations count"
          git push
